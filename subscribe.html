<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - AI Automation Weekly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        input[type="email"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #2563eb;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
        }
        .benefits {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .benefits h3 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 1em;
        }
        .benefits ul {
            list-style: none;
            color: #6b7280;
        }
        .benefits li {
            margin-bottom: 8px;
            padding-left: 24px;
            position: relative;
        }
        .benefits li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            text-decoration: none;
        }
        .back-link:hover {
            color: #2563eb;
        }
        .success-message {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .form-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div id="successMsg" class="success-message">
            ✅ Thanks for subscribing! Check your email for confirmation.
        </div>
        
        <h1>📧 Subscribe</h1>
        <p class="subtitle">Get weekly AI automation tips delivered to your inbox</p>
        
        <form id="subscribeForm" action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse" method="POST" target="_blank">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="entry.1234567890" placeholder="Your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="entry.0987654321" placeholder="you@example.com" required>
            </div>
            
            <button type="submit">Subscribe Free</button>
        </form>
        
        <div class="benefits">
            <h3>What you'll get:</h3>
            <ul>
                <li>Weekly automation tips</li>
                <li>Exclusive tutorials</li>
                <li>Tool recommendations</li>
                <li>No spam, ever</li>
            </ul>
        </div>
        
        <a href="/ai-automation-blog/" class="back-link">← Back to blog</a>
    </div>
    
    <script>
        document.getElementById('subscribeForm').addEventListener('submit', function() {
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(function() {
                window.location.href = '/ai-automation-blog/';
            }, 2000);
        });
    </script>
</body>
</html>
